<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Rogue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-wrapper">
        <div class="stats-bar">
            <div class="stats-group">
                <span>LV: <span id="lv">1</span></span>
                <span>HP: <span id="hp">20/20</span></span>
                <div class="stamina-container">ST: <span class="stamina-gauge-bg"><span id="stamina-bar"></span></span>
                </div>
            </div>
            <div class="stats-group">
                <span>FLOOR <span id="floor">1/100</span></span>
                <span class="equip-row"><span id="sword-status"></span> <span id="armor-status"></span> <span id="fairy-status"></span> <span id="gold-status" style="color: #fff;"></span></span>
                <span id="ring-status" style="color: #aaa; font-size: 11px;"></span>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div class="log-row">
            <div id="log" class="game-log">
                <div>Welcome to the Depths.</div>
            </div>
            <div class="best-floor-panel">BEST<br><span id="best-floor">B1F</span><div id="minimap"></div></div>
        </div>
    </div>
    <script src="script.js?v=17"></script>
</body>

</html>
